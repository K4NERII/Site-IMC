<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <div class="header">
                <h1>IMC</h1>
                <p>Massa Corporal</p>
            </div>

            <form id="imcForm">
                <div class="input-group">
                    <label for="peso">
                         Peso (kg)
                    </label>
                    <input 
                        type="number" 
                        id="peso" 
                        placeholder="Ex: 70.5" 
                        step="0.1" 
                        min="20" 
                        max="300" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="altura">
                         Altura (m)
                    </label>
                    <input 
                        type="number" 
                        id="altura" 
                        placeholder="Ex: 1.75" 
                        step="0.01" 
                        min="0.5" 
                        max="2.5" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="whatsapp">
                         WhatsApp
                    </label>
                    <input 
                        type="tel" 
                        id="whatsapp" 
                        placeholder="(XX) XXXXX-XXXX" 
                        required
                    >
                    <small>Digite seu número com DDD</small>
                </div>

                <button type="submit" class="calculate-btn">
                    Calcular IMC
                </button>
            </form>

            <div id="resultado" class="resultado hidden">
                <div class="resultado-card">
                    <h2>Seu Resultado</h2>
                    <div id="imcValue" class="imc-value"></div>
                    <div id="classificacao" class="classificacao"></div>
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <button id="whatsappBtn" class="whatsapp-btn">
                     Enviar para WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
